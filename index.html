<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test de Mecanografía</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="container mt-5">

    <!-- LOGIN -->
    <div id="loginScreen" class="card shadow">
      <div class="card-body text-center p-5">
        <h2 class="mb-3">Examen de Mecanografía</h2>
        <p class="mb-2">Inicia sesión con tu cuenta institucional</p>
        <p class="text-muted">@cesanrafael.org</p>

        <div
          id="g_id_onload"
          data-client_id="103430746301-3cq2kchjklffrvkf1tcrq909f4mo1hh1.apps.googleusercontent.com"
          data-callback="handleCredentialResponse"
          data-auto_prompt="false">
        </div>

        <div
          class="g_id_signin"
          data-type="standard"
          data-size="large"
          data-theme="outline"
          data-text="signin_with"
          data-shape="rectangular"
          data-logo_alignment="left">
        </div>

        <p id="loginMessage" class="mt-3"></p>
      </div>
    </div>

    <!-- EXAMEN -->
    <div id="examScreen" class="card shadow d-none">
      <div class="card-body">
        <h3 class="text-center mb-4">Test de Mecanografía</h3>

        <div class="user-box mb-4">
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Correo institucional</label>
              <input type="email" class="form-control" id="correo" readonly>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control" id="nombre" readonly>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Apellido</label>
              <input type="text" class="form-control" id="apellido" readonly>
            </div>
          </div>
        </div>

        <form id="testForm">
          <div class="mb-3">
            <label for="textoOriginal" class="form-label">Texto para escribir:</label>
            <textarea class="form-control" id="textoOriginal" rows="8" readonly></textarea>
          </div>

          <div class="mb-3">
            <label for="textoUsuario" class="form-label">Escribe aquí:</label>
            <textarea
              class="form-control"
              id="textoUsuario"
              rows="8"
              oninput="evaluarTexto()"
              onpaste="return false"
              onkeydown="bloquearCtrlV(event)"></textarea>
          </div>

          <p id="tiempoRestante" class="text-center mt-2">Tiempo restante: 2:00</p>
        </form>

        <p id="resultado" class="mt-3 text-center"></p>
        <p id="contadorPalabras" class="text-center mt-2">
          Palabras correctas: 0 | WPM: 0 | Precisión: 0% | Puntuación: 0/100
        </p>
      </div>
    </div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
